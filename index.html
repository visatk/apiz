<!doctype html>
<html lang="en" class="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CF Stack — Vite + React + Hono + Cloudflare Workers production starter" />
    <meta name="theme-color" content="#6272f5" />

    <!-- Open Graph -->
    <meta property="og:title" content="CF Stack" />
    <meta property="og:description" content="Production-ready full-stack edge template" />
    <meta property="og:type" content="website" />

    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>CF Stack</title>

    <!-- Dark mode init — prevents flash -->
    <script>
      (function () {
        const stored = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (stored === "dark" || (!stored && prefersDark)) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
